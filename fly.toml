# fly.toml for DNSTT server
app = "dnstt-server"

primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[service]
  ports = [
    { port = 53, protocol = "udp" },
    { port = 8000, protocol = "tcp" }
  ]
  size = "shared-cpu-1x"
  min_machines_running = 1

  [[service.environment]]
    name = "DOMAIN"
    value = "t.example.com"  # change via fly secrets set DOMAIN=your.domain.com

[experimental]
  allowed_public_ports = []
  auto_rollback = true
